# ============================================================================
# Docker Compose - Base Configuration
# Reads configuration from src/.env (Laravel's .env file)
# Use: docker-compose up  OR  ./docker-up.sh (auto-detects dev/prod)
# ============================================================================

services:
  # ============================================================================
  # Laravel Application Container
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      # target will be set by docker-up.sh based on APP_ENV in src/.env
      target: ${BUILD_TARGET:-production}
    image: laravel-app:${BUILD_TARGET:-production}
    restart: unless-stopped

    # Load environment from Laravel's .env file
    env_file:
      - ./src/.env

    environment:
      TZ: Europe/Rome
      # Map www-data UID/GID to host user (fixes permission issues)
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}

    volumes:
      # Mount Laravel application
      - ./src:/var/www/html
      # Cache directories su named volumes (più veloci dei bind mounts)
      - laravel-cache:/var/www/html/storage/framework/cache
      - laravel-views:/var/www/html/storage/framework/views
      - laravel-sessions:/var/www/html/storage/framework/sessions

    ports:
      - "80:80"     # HTTP (redirects to HTTPS)
      - "443:443"   # HTTPS

    networks:
      - laravel-network

    healthcheck:
      test: ["CMD", "/docker/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

# ============================================================================
# Networks
# ============================================================================
networks:
  laravel-network:
    driver: bridge

# ============================================================================
# Volumes (named volumes per performance cache)
# ============================================================================
volumes:
  laravel-cache:
  laravel-views:
  laravel-sessions:
