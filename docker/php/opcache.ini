; ============================================================================
; OPcache Configuration - Production Optimized
; ============================================================================

[opcache]
; Enable OPcache
opcache.enable = 0
opcache.enable_cli = 0

; Memory configuration
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000

; Revalidation (will be disabled in production via environment)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Performance
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; Optimization
opcache.optimization_level = 0x7FFFFFFF

; Preloading (disabled by default, can be enabled in production)
; opcache.preload = /var/www/html/preload.php
; opcache.preload_user = www-data

; JIT (Just In Time) compilation - PHP 8.4
opcache.jit = tracing
opcache.jit_buffer_size = 100M

; Error logging
opcache.error_log = /dev/stderr
opcache.log_verbosity_level = 1
