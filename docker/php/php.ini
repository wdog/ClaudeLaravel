[PHP]
; ============================================================================
; PHP Configuration for Laravel
; ============================================================================

; Error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Security
expose_php = Off
; Laravel requires proc_open and popen for Artisan commands and process management
;disable_functions = passthru,shell_exec,system,curl_exec,curl_multi_exec,parse_ini_file,show_source

; Memory & Limits
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
post_max_size = 50M
upload_max_filesize = 50M
max_file_uploads = 20

; Session
session.save_handler = files
session.save_path = "/var/www/html/storage/framework/sessions"
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 0
session.cookie_samesite = "Lax"
session.gc_maxlifetime = 7200

; Date
date.timezone = Europe/Rome

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; File uploads
file_uploads = On

; Character encoding
default_charset = "UTF-8"

; Output buffering
output_buffering = 4096

; Zlib compression
zlib.output_compression = Off
